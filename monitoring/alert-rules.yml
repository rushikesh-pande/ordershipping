# Monitoring Enhancement: Prometheus Alert Rules for ordershipping
# Deploy to AlertManager alongside Prometheus scrape config.
groups:
  - name: ordershipping_alerts
    interval: 30s
    rules:

      # ── High Error Rate ──────────────────────────────────────────────────────
      - alert: HighErrorRate_ordershipping
        expr: |
          rate(ordershipping_errors_total{service="ordershipping"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: ordershipping
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on ordershipping"

      # ── High HTTP Latency ────────────────────────────────────────────────────
      - alert: HighLatency_ordershipping
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="ordershipping"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: ordershipping
        annotations:
          summary: "p95 latency above 2s on ordershipping"
          description: "p95 latency is {{ $value }}s on ordershipping"

      # ── Service Down ─────────────────────────────────────────────────────────
      - alert: ServiceDown_ordershipping
        expr: |
          up{job="ordershipping"} == 0
        for: 1m
        labels:
          severity: critical
          service: ordershipping
        annotations:
          summary: "ordershipping is DOWN"
          description: "ordershipping Prometheus target is not reachable"

      # ── High Heap Memory ─────────────────────────────────────────────────────
      - alert: HighHeapMemory_ordershipping
        expr: |
          (jvm_memory_used_bytes{service="ordershipping",area="heap"} /
           jvm_memory_max_bytes{service="ordershipping",area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: ordershipping
        annotations:
          summary: "JVM Heap above 85% on ordershipping"
          description: "Heap usage is {{ $value | humanizePercentage }} on ordershipping"

      # ── Too Many 5xx Responses ───────────────────────────────────────────────
      - alert: High5xxRate_ordershipping
        expr: |
          rate(http_server_requests_seconds_count{service="ordershipping",status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: ordershipping
        annotations:
          summary: "High 5xx rate on ordershipping"
          description: "5xx rate is {{ $value | humanize }} req/s on ordershipping"

      # ── High CPU Usage ───────────────────────────────────────────────────────
      - alert: HighCpuUsage_ordershipping
        expr: |
          process_cpu_usage{service="ordershipping"} > 0.80
        for: 5m
        labels:
          severity: warning
          service: ordershipping
        annotations:
          summary: "CPU above 80% on ordershipping"
          description: "CPU usage is {{ $value | humanizePercentage }} on ordershipping"
